<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Infinito ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap');
        
        #bloqueio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a1a; z-index: 3000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        #conteudo-privado { display: none; }
        
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0a0a1a; color: #f0f0f0; text-align: center; padding-top: 80px; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        nav { 
            background: rgba(20, 5, 35, 0.98); padding: 15px 0; 
            border-bottom: 2px solid #d4af37; position: fixed; 
            top: 0; left: 0; width: 100%; z-index: 2000; 
            display: flex; justify-content: space-around; 
        }
        nav a { text-decoration: none; color: #d4af37; font-weight: 600; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .card { background: rgba(142, 68, 173, 0.1); border: 2px solid #d4af37; border-radius: 20px; padding: 20px; margin: 15px auto; max-width: 360px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
        .btn-acao { background: #8e44ad; color: white; border: none; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; margin: 10px 0; transition: 0.3s; font-size: 0.9rem; }
        .btn-acao:hover { background: #d4af37; color: #0a0a1a; transform: scale(1.05); }
        .titulo { font-family: 'Great Vibes', cursive; color: #d4af37; font-size: 2.5rem; margin: 15px 0; }
        
        .tab-content { display: none; padding: 10px; animation: fadeIn 0.6s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input { width: 85%; padding: 12px; background: rgba(255,255,255,0.08); border: 1px solid #8e44ad; color: white; border-radius: 12px; margin-bottom: 12px; outline: none; text-align: center; }

        /* Estilo da Galeria - Igual ao seu exemplo de 3 colunas */
        .grid-galeria { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* 3 colunas iguais */
            gap: 5px; /* Espaço pequeno entre as fotos */
            margin-top: 15px;
        }
        .foto-item { 
            width: 100%; 
            aspect-ratio: 1 / 1; /* Mantém as fotos quadradinhas */
            object-fit: cover; 
            border: 1px solid rgba(212, 175, 55, 0.3);
            cursor: pointer;
            transition: 0.2s;
        }
        .foto-item:hover { opacity: 0.8; }

        #muralChat { text-align: left; height: 300px; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 15px; display: flex; flex-direction: column; border: 1px solid rgba(212, 175, 55, 0.3); }
        .balao { max-width: 85%; padding: 10px 14px; border-radius: 18px; margin-bottom: 10px; font-size: 0.85rem; background: #2b2b2b; align-self: flex-start; border-bottom-left-radius: 4px; }
    </style>
</head>
<body>

    <div id="bloqueio">
        <h1 class="titulo">Nossa Data Mágica</h1>
        <input type="password" id="inputSenha" placeholder="Digite a nossa senha...">
        <button class="btn-acao" onclick="acessar()">Entrar no Nosso Mundo</button>
    </div>

    <div id="conteudo-privado">
        <div class="stars" id="starField"></div>
        <nav>
            <a href="#" onclick="tab(event, 'home')">Início</a>
            <a href="#" onclick="tab(event, 'diario')">Frases</a>
            <a href="#" onclick="tab(event, 'fotos-aba')">Momentos</a>
            <a href="#" onclick="tab(event, 'sonhos')">Sonhos</a>
            <a href="#" onclick="tab(event, 'chat-aba')">Sentir</a>
        </nav>

        <main>
            <div id="home" class="tab-content active">
                <h1 class="titulo">Desde 28/12/2025</h1>
                <img src="Amor.png" style="width:130px; border-radius:30px; border:2px solid #d4af37; margin-bottom: 10px;">
                <p id="timer" style="font-weight: 600; color: #d4af37; font-size: 1.1rem;"></p>
            </div>

            <div id="fotos-aba" class="tab-content">
                <h2 class="titulo">Galeria Love</h2>
                <div class="card" style="max-width: 100%; margin: 0; border: none; background: transparent;">
                    <input type="file" id="inputFoto" accept="image/*" style="display: none;">
                    <button class="btn-acao" onclick="document.getElementById('inputFoto').click()">Adicionar Novo Momento 📸</button>
                    <div class="grid-galeria" id="containerFotos">
                        </div>
                </div>
            </div>

            <div id="diario" class="tab-content">
                <h2 class="titulo">Mensagem Diária</h2>
                <div class="card"><p id="textoDoDia" style="font-size: 1.1rem; font-style: italic;"></p></div>
            </div>

            <div id="sonhos" class="tab-content">
                <h2 class="titulo">Nossos Sonhos</h2>
                <div class="card">
                    <input type="text" id="inputSonho" placeholder="O que vamos realizar?">
                    <button class="btn-acao" id="btnSonho">Salvar ✅</button>
                    <ul id="listaSonhos" style="text-align: left; padding: 0; list-style: none;"></ul>
                </div>
            </div>

            <div id="chat-aba" class="tab-content">
                <h2 class="titulo">Sentimentos</h2>
                <div class="card">
                    <div id="muralChat"></div>
                    <div style="margin-top:15px; display: flex; gap: 8px;">
                        <input type="text" id="textoChat" placeholder="O que sente?" style="margin-bottom:0; flex:1">
                        <button class="btn-acao" id="btnChat" style="margin-top:0;">Postar</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCz3H8bjiuS2gNvxUr_G3Csd21wL5J1gLw",
            authDomain: "project-3726343372287499417.firebaseapp.com",
            databaseURL: "https://project-3726343372287499417-default-rtdb.firebaseio.com",
            projectId: "project-3726343372287499417",
            storageBucket: "project-3726343372287499417.firebasestorage.app",
            messagingSenderId: "198997508418",
            appId: "1:198997508418:web:d6f13c38481348462218db"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        window.acessar = () => {
            if(document.getElementById('inputSenha').value === "2810") {
                document.getElementById('bloqueio').style.display = 'none';
                document.getElementById('conteudo-privado').style.display = 'block';
                gerarEstrelas(); iniciarTimer();
                document.getElementById('textoDoDia').innerText = "Cada foto aqui é um pedaço da nossa história. ❤️";
            } else { alert("Senha incorreta!"); }
        };

        window.tab = (e, id) => {
            e.preventDefault();
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        // Lógica de Galeria (Upload e Realtime)
        document.getElementById('inputFoto').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const storageReference = sRef(storage, 'galeria/' + Date.now() + "_" + file.name);
            await uploadBytes(storageReference, file);
            const url = await getDownloadURL(storageReference);
            push(ref(db, 'galeria_fotos'), { url });
        };

        onValue(ref(db, 'galeria_fotos'), (snap) => {
            const container = document.getElementById('containerFotos');
            container.innerHTML = "";
            snap.forEach(child => {
                container.innerHTML += `<img src="${child.val().url}" class="foto-item" onclick="window.open(this.src)">`;
            });
        });

        // Outras funções (Chat/Sonhos)
        document.getElementById('btnChat').onclick = () => {
            const txt = document.getElementById('textoChat').value;
            if(txt.trim()) push(ref(db, 'chat'), { msg: txt, data: new Date().toLocaleDateString() });
            document.getElementById('textoChat').value = "";
        };
        onValue(ref(db, 'chat'), (snap) => {
            const div = document.getElementById('muralChat'); div.innerHTML = "";
            snap.forEach(child => { div.innerHTML += `<div class="balao">${child.val().msg}</div>`; });
            div.scrollTop = div.scrollHeight;
        });

        document.getElementById('btnSonho').onclick = () => {
            const s = document.getElementById('inputSonho').value;
            if(s.trim()) push(ref(db, 'sonhos'), { texto: s });
            document.getElementById('inputSonho').value = "";
        };
        onValue(ref(db, 'sonhos'), (snap) => {
            const ul = document.getElementById('listaSonhos'); ul.innerHTML = "";
            snap.forEach(child => { ul.innerHTML += `<li style="margin-bottom:8px;">✨ ${child.val().texto}</li>`; });
        });

        function gerarEstrelas() {
            const f = document.getElementById('starField');
            for(let i=0; i<60; i++) {
                const s = document.createElement('div');
                s.className = 'star'; s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
                s.style.width = s.style.height = Math.random()*2+'px'; s.style.setProperty('--d', Math.random()*3+2+'s');
                f.appendChild(s);
            }
        }

        function iniciarTimer() {
            const dataInic = new Date(2025, 11, 28);
            setInterval(() => {
                const diff = new Date() - dataInic;
                document.getElementById('timer').innerText = Math.floor(diff / 86400000) + " dias de nós.";
            }, 1000);
        }
    </script>
</body>
</html>
