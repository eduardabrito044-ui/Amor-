<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Mundo Particular ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap');
        
        #bloqueio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a1a; z-index: 2000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        #conteudo-privado { display: none; }
        
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0a0a1a; color: #f0f0f0; text-align: center; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        nav { background: rgba(15, 5, 30, 0.9); padding: 15px; border-bottom: 2px solid #d4af37; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-around; }
        nav a { text-decoration: none; color: #d4af37; font-weight: 600; font-size: 0.85rem; }
        
        .card { background: rgba(142, 68, 173, 0.1); border: 2px solid #d4af37; border-radius: 20px; padding: 20px; margin: 20px auto; max-width: 350px; }
        .btn-acao { background: #8e44ad; color: white; border: 1px solid #d4af37; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .titulo { font-family: 'Great Vibes', cursive; color: #d4af37; font-size: 2.8rem; margin: 15px 0; }
        
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.5s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        input, textarea { width: 85%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #8e44ad; color: white; border-radius: 10px; margin-bottom: 10px; outline: none; }
        #mural { text-align: left; max-height: 250px; overflow-y: auto; margin-top: 15px; }
        .msg-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border-left: 3px solid #d4af37; margin-bottom: 10px; font-size: 0.9rem; }
        .data-msg { font-size: 0.7rem; color: #8e44ad; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="bloqueio">
        <h1 class="titulo">Nossa Chave</h1>
        <input type="password" id="inputSenha" placeholder="Digite a senha..." style="text-align:center">
        <button class="btn-acao" onclick="acessar()">Entrar no Nosso Mundo</button>
    </div>

    <div id="conteudo-privado">
        <div class="stars" id="starField"></div>
        <nav>
            <a href="#" onclick="tab(event, 'home')">Início</a>
            <a href="#" onclick="tab(event, 'filho')">Nosso Menino</a>
            <a href="#" onclick="tab(event, 'mural-aba')">Mural</a>
        </nav>

        <main>
            <div id="home" class="tab-content active">
                <h1 class="titulo">Bem-vinda, Eduarda</h1>
                <img src="Amor.png" style="width:180px; border-radius:20px; border:3px solid #d4af37">
                <p id="timer" style="font-weight: bold; color: #d4af37; margin-top: 20px;"></p>
                <a href="https://www.youtube.com/watch?v=W07mInS-tLw" target="_blank" class="btn-acao" style="text-decoration:none; display:inline-block">🎵 Tocar Nossa Música</a>
            </div>

            <div id="filho" class="tab-content">
                <h2 class="titulo">Dose de Fofura</h2>
                <div class="card">
                    <img src="1000059897.jpg" style="width: 100%; border-radius: 15px;">
                    <p style="font-style: italic; color: #d4af37; margin-top: 15px;">"A razão do nosso sorriso diário."</p>
                </div>
            </div>

            <div id="mural-aba" class="tab-content">
                <h2 class="titulo">Nosso Mural</h2>
                <div class="card">
                    <textarea id="textoSentimento" placeholder="Escreva algo para ficar guardado aqui..."></textarea>
                    <button class="btn-acao" id="btnSentimento">Gravar no Coração 💝</button>
                    <div id="mural"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Configurações do seu print!
        const firebaseConfig = {
            apiKey: "AIzaSyCz3H8bjiuS2gNvxUr_G3Csd21wL5J1gLw",
            authDomain: "project-3726343372287499417.firebaseapp.com",
            databaseURL: "https://project-3726343372287499417-default-rtdb.firebaseio.com",
            projectId: "project-3726343372287499417",
            storageBucket: "project-3726343372287499417.firebasestorage.app",
            messagingSenderId: "198997508418",
            appId: "1:198997508418:web:d6f13c38481348462218db"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Acesso
        window.acessar = () => {
            if(document.getElementById('inputSenha').value === "2809") {
                document.getElementById('bloqueio').style.display = 'none';
                document.getElementById('conteudo-privado').style.display = 'block';
                gerarEstrelas();
                iniciarTimer();
            } else { alert("Senha incorreta, amor!"); }
        };

        // Abas
        window.tab = (e, id) => {
            e.preventDefault();
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        // Mural de Sentimentos
        document.getElementById('btnSentimento').onclick = () => {
            const txt = document.getElementById('textoSentimento').value;
            if(txt.trim()) {
                push(ref(db, 'mural'), { 
                    msg: txt, 
                    data: new Date().toLocaleString('pt-BR') 
                });
                document.getElementById('textoSentimento').value = "";
            }
        };

        onValue(ref(db, 'mural'), (snap) => {
            const div = document.getElementById('mural'); 
            div.innerHTML = "";
            snap.forEach(child => {
                const item = child.val();
                div.innerHTML = `
                    <div class="msg-item">
                        ${item.msg}
                        <span class="data-msg">${item.data}</span>
                    </div>` + div.innerHTML;
            });
        });

        // Estéticas
        function gerarEstrelas() {
            const field = document.getElementById('starField');
            for(let i=0; i<80; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.width = s.style.height = Math.random()*3+'px';
                s.style.left = Math.random()*100+'%';
                s.style.top = Math.random()*100+'%';
                s.style.setProperty('--d', Math.random()*3+2+'s');
                field.appendChild(s);
            }
        }

        function iniciarTimer() {
            const dataInicio = new Date(2025, 8, 28);
            setInterval(() => {
                const dias = Math.floor((new Date() - dataInicio) / 86400000);
                document.getElementById('timer').innerText = dias + " dias de nossa história.";
            }, 1000);
        }
    </script>
</body>
</html>
