<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Eterno Começo ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap');
        
        #bloqueio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a1a; z-index: 3000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        #conteudo-privado { display: none; }
        
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0a0a1a; color: #f0f0f0; text-align: center; padding-top: 80px; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        nav { 
            background: rgba(20, 5, 35, 0.98); padding: 15px 0; 
            border-bottom: 2px solid #d4af37; position: fixed; 
            top: 0; left: 0; width: 100%; z-index: 2000; 
            display: flex; justify-content: space-around; 
        }
        nav a { text-decoration: none; color: #d4af37; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .card { background: rgba(142, 68, 173, 0.1); border: 2px solid #d4af37; border-radius: 20px; padding: 25px; margin: 20px auto; max-width: 350px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
        .btn-acao { background: #8e44ad; color: white; border: 1px solid #d4af37; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 10px; text-decoration: none; display: inline-block; transition: 0.3s; }
        .btn-acao:hover { background: #d4af37; color: #0a0a1a; }
        .titulo { font-family: 'Great Vibes', cursive; color: #d4af37; font-size: 2.8rem; margin: 15px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .tab-content { display: none; padding: 10px; animation: fadeIn 0.6s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input { width: 85%; padding: 12px; background: rgba(255,255,255,0.08); border: 1px solid #8e44ad; color: white; border-radius: 12px; margin-bottom: 12px; outline: none; text-align: center; }

        /* Mural de Sentimentos Estilo Chat */
        #muralChat { 
            text-align: left; height: 320px; overflow-y: auto; 
            padding: 15px; background: rgba(0,0,0,0.4); 
            border-radius: 15px; display: flex; flex-direction: column;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .balao { 
            max-width: 85%; padding: 12px 16px; border-radius: 20px; 
            margin-bottom: 12px; font-size: 0.9rem; line-height: 1.5;
            background: #2b2b2b; align-self: flex-start; border-bottom-left-radius: 4px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        .data-chat { font-size: 0.65rem; color: #d4af37; display: block; margin-top: 6px; font-weight: 300; }

        #listaSonhos { text-align: left; list-style: none; padding: 0; }
        #listaSonhos li { background: rgba(212, 175, 55, 0.1); margin-bottom: 10px; padding: 12px; border-radius: 12px; border-left: 4px solid #d4af37; font-size: 0.95rem; }
        
        .texto-diario { font-size: 1.2rem; line-height: 1.6; color: #fdfdfd; font-style: italic; font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body>

    <div id="bloqueio">
        <h1 class="titulo">Nossa Data Mágica</h1>
        <input type="password" id="inputSenha" placeholder="Digite a nossa senha...">
        <button class="btn-acao" onclick="acessar()">Entrar no Nosso Mundo</button>
    </div>

    <div id="conteudo-privado">
        <div class="stars" id="starField"></div>
        <nav>
            <a href="#" onclick="tab(event, 'home')">Início</a>
            <a href="#" onclick="tab(event, 'diario')">Frases</a>
            <a href="#" onclick="tab(event, 'sonhos')">Sonhos</a>
            <a href="#" onclick="tab(event, 'chat-aba')">Sentir</a>
        </nav>

        <main>
            <div id="home" class="tab-content active">
                <h1 class="titulo">Desde 28/12/2025</h1>
                <img src="Amor.png" style="width:140px; border-radius:30px; border:3px solid #d4af37; margin: 10px 0;">
                <p id="timer" style="font-weight: 600; color: #d4af37; font-size: 1.2rem;"></p>
                <a href="https://www.youtube.com/watch?v=yvAtv6v_QvY" target="_blank" class="btn-acao">🎵 Melim - Meu Abrigo</a>
            </div>

            <div id="diario" class="tab-content">
                <h2 class="titulo">Mensagem Diária</h2>
                <div class="card">
                    <p id="textoDoDia" class="texto-diario"></p>
                    <p style="color: #d4af37; font-weight: bold; margin-top: 25px; letter-spacing: 2px;">COM AMOR, SEMPRE.</p>
                </div>
            </div>

            <div id="sonhos" class="tab-content">
                <h2 class="titulo">Nossas Conquistas</h2>
                <div class="card">
                    <input type="text" id="inputSonho" placeholder="O que vamos realizar hoje?">
                    <button class="btn-acao" id="btnSonho">Eternizar Sonho ✨</button>
                    <ul id="listaSonhos"></ul>
                </div>
            </div>

            <div id="chat-aba" class="tab-content">
                <h2 class="titulo">Diário de Sentimentos</h2>
                <div class="card" style="max-width: 420px; padding: 15px;">
                    <div id="muralChat"></div>
                    <div style="margin-top:15px; display: flex; gap: 8px;">
                        <input type="text" id="textoChat" placeholder="Escreva aqui..." style="margin-bottom:0; flex:1">
                        <button class="btn-acao" id="btnChat" style="margin-top:0; padding: 10px 15px;">Postar</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Sua configuração original do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCz3H8bjiuS2gNvxUr_G3Csd21wL5J1gLw",
            authDomain: "project-3726343372287499417.firebaseapp.com",
            databaseURL: "https://project-3726343372287499417-default-rtdb.firebaseio.com",
            projectId: "project-3726343372287499417",
            storageBucket: "project-3726343372287499417.firebasestorage.app",
            messagingSenderId: "198997508418",
            appId: "1:198997508418:web:d6f13c38481348462218db"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const frasesSemana = [
            "Desde aquele 28 de dezembro, meu mundo ficou mais colorido. ❤️",
            "Você é a razão de todos os meus planos darem certo.",
            "Nosso amor é o abrigo que eu sempre procureu. ✨",
            "Obrigada por cada segundo ao meu lado desde o começo.",
            "Com você, a vida é uma aventura que eu nunca quero terminar.",
            "Você é meu presente favorito, hoje e todos os dias. 😊",
            "Meu coração bate no ritmo da nossa história."
        ];

        window.acessar = () => {
            // Senha configurada como 2810
            if(document.getElementById('inputSenha').value === "2810") {
                document.getElementById('bloqueio').style.display = 'none';
                document.getElementById('conteudo-privado').style.display = 'block';
                gerarEstrelas();
                iniciarTimer();
                const dia = new Date().getDay();
                document.getElementById('textoDoDia').innerText = frasesSemana[dia];
            } else { alert("Senha incorreta!"); }
        };

        window.tab = (e, id) => {
            e.preventDefault();
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        document.getElementById('btnChat').onclick = () => {
            const txt = document.getElementById('textoChat').value;
            if(txt.trim()) {
                push(ref(db, 'chat'), { 
                    msg: txt, 
                    hora: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}),
                    data: new Date().toLocaleDateString('pt-BR')
                });
                document.getElementById('textoChat').value = "";
            }
        };

        onValue(ref(db, 'chat'), (snap) => {
            const div = document.getElementById('muralChat'); 
            div.innerHTML = "";
            snap.forEach(child => {
                const item = child.val();
                div.innerHTML += `
                    <div class="balao">
                        ${item.msg}
                        <span class="data-chat">${item.data} às ${item.hora}</span>
                    </div>`;
            });
            div.scrollTop = div.scrollHeight;
        });

        document.getElementById('btnSonho').onclick = () => {
            const sonho = document.getElementById('inputSonho').value;
            if(sonho.trim()) {
                push(ref(db, 'sonhos'), { texto: sonho });
                document.getElementById('inputSonho').value = "";
            }
        };

        onValue(ref(db, 'sonhos'), (snap) => {
            const ul = document.getElementById('listaSonhos');
            ul.innerHTML = "";
            snap.forEach(child => {
                ul.innerHTML += `<li>✨ ${child.val().texto}</li>`;
            });
        });

        function gerarEstrelas() {
            const field = document.getElementById('starField');
            for(let i=0; i<85; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.width = s.style.height = Math.random()*2.5+'px';
                s.style.left = Math.random()*100+'%';
                s.style.top = Math.random()*100+'%';
                s.style.setProperty('--d', Math.random()*3+2+'s');
                field.appendChild(s);
            }
        }

        function iniciarTimer() {
            // Data de Início: 28 de Dezembro de 2025
            const dataInicio = new Date(2025, 11, 28); 
            setInterval(() => {
                const agora = new Date();
                const diferenca = agora - dataInicio;
                const dias = Math.floor(diferenca / 86400000);
                
                if (diferenca > 0) {
                    document.getElementById('timer').innerText = dias + " dias de pura felicidade.";
                } else {
                    document.getElementById('timer').innerText = "Ansiosa pelo nosso dia 28/12!";
                }
            }, 1000);
        }
    </script>
</body>
</html>
