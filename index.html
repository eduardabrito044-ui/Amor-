<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Refúgio Mágico ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap');

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #0a0a1a; color: #f0f0f0;
            overflow-x: hidden; text-align: center;
        }

        /* --- CÉU ESTRELADO --- */
        .stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background: radial-gradient(circle at center, #1a0a2e 0%, #0a0a1a 100%);
        }
        .star {
            position: absolute; background: white; border-radius: 50%;
            animation: twinkle var(--d) infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* --- CENÁRIO MÁGICO --- */
        .lua {
            position: fixed; top: 8%; right: 10%; width: 70px; height: 70px;
            background: #fefefe; border-radius: 50%;
            box-shadow: 0 0 40px #8e44ad, 0 0 80px rgba(214, 175, 55, 0.3);
        }
        .montanha {
            position: fixed; bottom: 0; width: 100%; height: 25vh;
            background: #050510; z-index: -1;
            clip-path: polygon(0% 100%, 15% 55%, 35% 75%, 60% 45%, 85% 80%, 100% 60%, 100% 100%);
        }
        .gato-area { position: fixed; bottom: 18vh; left: 15%; z-index: -1; }

        /* --- DESENHO DO IMPALA 67 CORRIGIDO --- */
        .impala-svg {
            position: fixed; bottom: 8vh; right: 5%; width: 150px;
            filter: drop-shadow(0 0 10px #8e44ad);
            opacity: 0.8; z-index: 1;
        }

        /* --- MENU --- */
        nav {
            background: rgba(15, 5, 30, 0.95);
            padding: 15px; border-bottom: 2px solid #d4af37;
            position: sticky; top: 0; z-index: 100;
        }
        nav a {
            text-decoration: none; color: #d4af37; font-weight: 600;
            margin: 0 12px; padding: 8px 18px; border-radius: 25px; transition: 0.3s;
        }
        nav a.active { background: #8e44ad; color: white; border: 1px solid #d4af37; }

        .btn-gold {
            background: #8e44ad; color: white; border: 1px solid #d4af37;
            padding: 12px 25px; border-radius: 50px; cursor: pointer;
            font-weight: bold; margin-top: 15px; text-decoration: none;
            display: inline-block; transition: 0.3s;
        }
        .btn-gold:hover { background: #d4af37; color: #1a0a2e; transform: scale(1.05); }

        .foto-perfil {
            width: 250px; border: 5px solid #d4af37; border-radius: 20px;
            box-shadow: 0 0 30px #8e44ad; margin: 20px 0;
            background-color: #1a0a2e;
        }
        
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.6s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #frase-aleatoria {
            font-family: 'Great Vibes', cursive;
            font-size: 2.2rem; color: #d4af37;
            min-height: 80px; transition: opacity 0.5s;
        }

        textarea {
            width: 90%; height: 100px; background: rgba(0,0,0,0.3);
            border: 1px solid #8e44ad; color: white; border-radius: 10px;
            padding: 10px; font-family: 'Poppins'; resize: none;
        }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>
    <div class="lua"></div>
    <div class="montanha"></div>
    
    <div class="gato-area"><span style="font-size: 35px;">🐈‍⬛</span></div>

    <svg class="impala-svg" viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg">
        <path d="M5,25 L15,10 L85,10 L95,25 L95,35 L5,35 Z" fill="#000" />
        <circle cx="20" cy="35" r="5" fill="#111" />
        <circle cx="80" cy="35" r="5" fill="#111" />
        <rect x="10" y="20" width="80" height="2" fill="#d4af37" opacity="0.5"/>
    </svg>

    <nav>
        <a href="#" class="active" onclick="switchTab(event, 'home')">Início</a>
        <a href="#" onclick="switchTab(event, 'sentimentos')">Sentimentos</a>
    </nav>

    <main>
        <div id="home" class="tab-content active">
            <h1 style="font-family: 'Great Vibes'; font-size: 3.5rem; color: #d4af37;">Nosso Abrigo</h1>
            
            <img src="Amor.png" class="foto-perfil" alt="Nossa Foto">
            
            <div id="frase-aleatoria">Carregando amor...</div>

            <a href="https://www.youtube.com/watch?v=W07mInS-tLw" target="_blank" class="btn-gold">
                🎵 Ouvir "Meu Abrigo" (Melim)
            </a>

            <div id="timer" style="margin-top: 30px; font-weight: bold; color: #9b59b6; font-size: 1.1rem;"></div>
        </div>

        <div id="sentimentos" class="tab-content">
             <div style="background: rgba(142, 68, 173, 0.1); border: 2px solid #d4af37; border-radius: 20px; padding: 30px; margin: 20px auto; max-width: 450px;">
                <h2 style="font-family: 'Great Vibes'; color: #d4af37; font-size: 2.8rem;">Como estou hoje... ✨</h2>
                <textarea id="textoSentimento" placeholder="Sinto que..."></textarea>
                <button class="btn-gold" onclick="enviarWhatsApp()">💝 Enviar para Ele</button>
            </div>
        </div>
    </main>

    <script>
        // --- ESTRELAS ---
        const sContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.width = s.style.height = Math.random() * 3 + 'px';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.setProperty('--d', Math.random() * 3 + 2 + 's');
            sContainer.appendChild(s);
        }

        // --- FRASES ALEATÓRIAS ---
        const frasesAmor = [
            "Você é o meu lugar favorito no mundo. ✨",
            "A vida é muito mais bonita com você ao meu lado. ❤️",
            "Cada detalhe seu me faz te amar ainda mais. 🥰",
            "Nosso amor é a minha maior sorte. 🍀",
            "Com você, o infinito parece pouco. 🌌",
            "O seu colo é o meu abrigo. 🏠"
        ];

        function mudarFrase() {
            const el = document.getElementById('frase-aleatoria');
            if(el) {
                el.style.opacity = 0;
                setTimeout(() => {
                    el.innerText = frasesAmor[Math.floor(Math.random() * frasesAmor.length)];
                    el.style.opacity = 1;
                }, 500);
            }
        }
        setInterval(mudarFrase, 5000);
        mudarFrase();

        // --- CONTADOR ---
        const inicio = new Date(2025, 8, 28, 0, 0, 0);
        setInterval(() => {
            const diff = new Date() - inicio;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerText = `Estamos juntos há: ${d}d ${h}h ${m}m ${s}s`;
        }, 1000);

        function switchTab(e, id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        function enviarWhatsApp() {
            const msg = document.getElementById('textoSentimento').value;
            // Número dele configurado
            window.open(`https://wa.me/5589981472448?text=${encodeURIComponent("✨ *Sentimento:* " + msg)}`, '_blank');
        }
    </script>
</body>
</html>
