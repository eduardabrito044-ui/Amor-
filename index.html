<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Refúgio Mágico ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap');

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #0a0a1a; color: #f0f0f0;
            overflow-x: hidden; text-align: center;
        }

        /* --- CÉU ESTRELADO --- */
        .stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background: radial-gradient(circle at center, #1a0a2e 0%, #0a0a1a 100%);
        }
        .star {
            position: absolute; background: white; border-radius: 50%;
            animation: twinkle var(--d) infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* --- CENÁRIO --- */
        .lua {
            position: fixed; top: 8%; right: 10%; width: 70px; height: 70px;
            background: #fefefe; border-radius: 50%;
            box-shadow: 0 0 40px #8e44ad, 0 0 80px rgba(214, 175, 55, 0.3);
        }
        .montanha {
            position: fixed; bottom: 0; width: 100%; height: 25vh;
            background: #050510; z-index: -1;
            clip-path: polygon(0% 100%, 15% 55%, 35% 75%, 60% 45%, 85% 80%, 100% 60%, 100% 100%);
        }

        /* --- MENU --- */
        nav {
            background: rgba(15, 5, 30, 0.95);
            padding: 15px; border-bottom: 2px solid #d4af37;
            position: sticky; top: 0; z-index: 100;
        }
        nav a {
            text-decoration: none; color: #d4af37; font-weight: 600;
            margin: 0 8px; padding: 8px 12px; border-radius: 25px; transition: 0.3s;
            font-size: 0.85rem;
        }
        nav a.active { background: #8e44ad; color: white; border: 1px solid #d4af37; }

        /* --- ESTILOS DOS CARDS --- */
        .card-luxo {
            background: linear-gradient(145deg, #2e1a4a, #1a0a2e);
            border: 2px solid #d4af37; border-radius: 20px;
            padding: 30px 20px; margin: 20px auto; max-width: 400px;
            box-shadow: 0 0 30px rgba(142, 68, 173, 0.3);
        }

        /* --- LISTA DE CONQUISTAS --- */
        #lista-conquistas {
            list-style: none; padding: 0; text-align: left; margin-top: 20px;
        }
        #lista-conquistas li {
            background: rgba(255,255,255,0.05);
            margin-bottom: 10px; padding: 12px;
            border-left: 4px solid #d4af37; border-radius: 5px;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* --- BOTÕES E INPUTS --- */
        .btn-gold {
            background: #8e44ad; color: white; border: 1px solid #d4af37;
            padding: 10px 20px; border-radius: 50px; cursor: pointer;
            font-weight: bold; margin-top: 10px; text-decoration: none;
            display: inline-block; transition: 0.3s;
        }
        .btn-gold:hover { background: #d4af37; color: #1a0a2e; }

        input, textarea {
            width: 85%; padding: 12px; background: rgba(0,0,0,0.3);
            border: 1px solid #8e44ad; color: white; border-radius: 10px; outline: none;
        }

        /* --- GERAL --- */
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.6s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .foto-perfil { width: 220px; border: 4px solid #d4af37; border-radius: 20px; margin: 15px 0; }
        .titulo-fonte { font-family: 'Great Vibes', cursive; color: #d4af37; }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>
    <div class="lua"></div>
    <div class="montanha"></div>

    <nav>
        <a href="#" class="active" onclick="switchTab(event, 'home')">Início</a>
        <a href="#" onclick="switchTab(event, 'cartao')">Cartão</a>
        <a href="#" onclick="switchTab(event, 'conquistas')">Conquistas</a>
        <a href="#" onclick="switchTab(event, 'sentimentos')">Sentimentos</a>
    </nav>

    <main>
        <div id="home" class="tab-content active">
            <h1 class="titulo-fonte" style="font-size: 3rem;">Nosso Abrigo</h1>
            <img src="Amor.png" class="foto-perfil" alt="Nossa Foto">
            <br>
            <a href="https://www.youtube.com/watch?v=W07mInS-tLw" target="_blank" class="btn-gold">🎵 Ouvir Nossa Música</a>
            <div id="timer" style="margin-top: 25px; font-weight: bold; color: #9b59b6;"></div>
        </div>

        <div id="cartao" class="tab-content">
            <h2 class="titulo-fonte" style="font-size: 2.5rem;">Recadinho do Dia</h2>
            <div class="card-luxo">
                <span id="data-atual" style="color:#d4af37; font-size: 0.9rem;"></span>
                <div id="msg-diaria" style="font-family: 'Great Vibes'; font-size: 2.2rem; margin-top: 15px;"></div>
            </div>
        </div>

        <div id="conquistas" class="tab-content">
            <h2 class="titulo-fonte" style="font-size: 2.5rem;">Para Conquistarmos Juntos</h2>
            <div class="card-luxo">
                <input type="text" id="novoItem" placeholder="Ex: Nossa primeira viagem...">
                <button class="btn-gold" onclick="adicionarConquista()">✨ Adicionar à Lista</button>
                
                <ul id="lista-conquistas">
                    <li><span>Viajar para a praia</span> <span>✅</span></li>
                    <li><span>Ter nossa casa</span> <span>✅</span></li>
                </ul>
            </div>
        </div>

        <div id="sentimentos" class="tab-content">
             <div class="card-luxo">
                <h2 class="titulo-fonte" style="font-size: 2.5rem;">Como estou hoje...</h2>
                <textarea id="textoSentimento" placeholder="Escreva aqui..."></textarea>
                <button class="btn-gold" onclick="enviarWhatsApp()">💝 Enviar para Ele</button>
            </div>
        </div>
    </main>

    <script>
        // --- ESTRELAS ---
        const sContainer = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.width = s.style.height = Math.random() * 3 + 'px';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.setProperty('--d', Math.random() * 3 + 2 + 's');
            sContainer.appendChild(s);
        }

        // --- CARTÃO DIÁRIO ---
        const frases = [
            "Você é o meu melhor plano de futuro. ❤️",
            "Onde você estiver, é onde quero morar. 😊",
            "Cada dia com você é uma nova conquista. ✨",
            "Te amo mais do que as estrelas do céu. 🌌",
            "Você é a minha paz em meio ao caos. 🕊️"
        ];
        function carregarCartao() {
            const hoje = new Date();
            document.getElementById('data-atual').innerText = hoje.toLocaleDateString('pt-BR');
            const indice = hoje.getDate() % frases.length;
            document.getElementById('msg-diaria').innerText = frases[indice];
        }
        carregarCartao();

        // --- LISTA DE CONQUISTAS ---
        function adicionarConquista() {
            const input = document.getElementById('novoItem');
            if (input.value.trim() !== "") {
                const li = document.createElement('li');
                li.innerHTML = `<span>${input.value}</span> <span>✅</span>`;
                document.getElementById('lista-conquistas').appendChild(li);
                input.value = "";
            }
        }

        // --- TIMER ---
        const inicio = new Date(2025, 8, 28);
        setInterval(() => {
            const diff = new Date() - inicio;
            const d = Math.floor(diff / 86400000);
            document.getElementById('timer').innerText = `${d} dias de muito amor! ❤️`;
        }, 1000);

        // --- NAVEGAÇÃO ---
        function switchTab(e, id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        // --- WHATSAPP ---
        function enviarWhatsApp() {
            const msg = document.getElementById('textoSentimento').value;
            window.open(`https://wa.me/5589981472448?text=${encodeURIComponent("✨ *Meu Sentimento:* " + msg)}`, '_blank');
        }
    </script>
</body>
</html>
